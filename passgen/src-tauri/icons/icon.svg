<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">

  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="pill-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg-grad)"/>

  <!-- subtle inner shadow ring -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>

  <!-- black pill -->
  <rect x="88" y="196" width="336" height="120" rx="60" ry="60" fill="url(#pill-shine)"/>

  <!-- three circles — same white color -->
  <circle cx="192" cy="256" r="28" fill="#ffffff"/>
  <circle cx="256" cy="256" r="28" fill="#ffffff"/>
  <circle cx="320" cy="256" r="28" fill="#ffffff"/>

</svg>
